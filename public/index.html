<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>第Ｎ曜日 - 繰り返し曜日の日付一覧</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #f0f4f8;
  color: #1a202c;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #4c51bf, #6b46c1);
  color: #fff;
  padding: 3rem 1.5rem 2.5rem;
  text-align: center;
}
header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}
header p {
  margin-top: 0.75rem;
  font-size: 1.05rem;
  opacity: 0.9;
  line-height: 1.6;
}
.card {
  background: #fff;
  max-width: 600px;
  margin: -1.5rem auto 2rem;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  padding: 2rem;
}
.form-section {
  margin-bottom: 1.5rem;
}
.form-section:last-child { margin-bottom: 0; }
.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}
.weekday-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-wrap: wrap;
  font-size: 1.1rem;
  line-height: 2.4;
}
.weekday-row span {
  white-space: nowrap;
}
select, input[type="text"], input[name="summary"],
input[name="start_at"], input[name="end_at"] {
  font-size: 1rem;
  padding: 0.45rem 0.6rem;
  border: 1.5px solid #d1d5db;
  border-radius: 6px;
  background: #fff;
  color: #1a202c;
  transition: border-color 0.2s;
  font-family: inherit;
}
select:focus, input:focus {
  outline: none;
  border-color: #6b46c1;
  box-shadow: 0 0 0 3px rgba(107,70,193,0.15);
}
.format-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.ical-section {
  background: #f9fafb;
  border-radius: 8px;
  padding: 1rem 1.25rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}
.ical-section .field { display: flex; flex-direction: column; gap: 0.25rem; }
.ical-section .field.full { grid-column: 1 / -1; }
.ical-section label {
  font-size: 0.8rem;
  color: #6b7280;
  font-weight: 500;
}
.ical-section input {
  width: 100%;
}
button[type="submit"] {
  display: block;
  width: 100%;
  padding: 0.85rem;
  font-size: 1.05rem;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, #4c51bf, #6b46c1);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity 0.2s;
  font-family: inherit;
}
button[type="submit"]:hover { opacity: 0.9; }
footer {
  text-align: center;
  padding: 1.5rem;
  font-size: 0.85rem;
  color: #9ca3af;
}
footer a { color: #6b46c1; text-decoration: none; }
footer a:hover { text-decoration: underline; }
@media (max-width: 640px) {
  header { padding: 2rem 1rem 2rem; }
  header h1 { font-size: 1.5rem; }
  .card { margin: -1rem 0.75rem 1.5rem; padding: 1.5rem; }
  .ical-section { grid-template-columns: 1fr; }
}
</style></head><body><header><h1>第Ｎ曜日</h1><p>「第2・第4木曜日」のような繰り返し曜日の日付一覧を取得</p></header><div class="card"><form action="/api/week" method="get"><div class="form-section"><span class="form-label">日付の条件</span><div class="weekday-row"><select name="year"><option>2024</option><option>2025</option><option selected>2026</option><option>2027</option><option>2028</option></select><span>年</span><span>&ensp;第</span><select name="num"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select><span>・第</span><select name="num2"><option value=""> -</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select><span>&ensp;</span><select name="wday"><option value="su">日</option><option value="mo">月</option><option value="tu">火</option><option value="we">水</option><option value="th">木</option><option value="fr">金</option><option value="sa">土</option></select><span>曜日</span></div></div><div class="form-section"><span class="form-label">出力フォーマット</span><div class="format-row"><select name="format"><option>html</option><option>csv</option><option>json</option><option>js</option><option>ical</option></select></div></div><div class="form-section"><span class="form-label">iCal オプション</span><div class="ical-section"><div class="field full"><label>予定名</label><input name="summary" placeholder="例: 定例ミーティング"></div><div class="field"><label>開始時刻</label><input name="start_at" value="8:00"></div><div class="field"><label>終了時刻</label><input name="end_at" value="8:00"></div></div></div><div class="form-section"><button type="submit">取得する</button></div></form></div><footer>前後1年、計3年分の日付を一覧表示します &middot;<a href="https://github.com/kuboon/cal.kbn.one">GitHub</a></footer></body></html>
